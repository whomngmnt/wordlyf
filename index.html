<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Wordly">
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main>

        <section id="main-page" class="main-section">
            <div class="stats-circle-wrapper">
                <div class="stats-circle">
                    <span id="learned-count">0</span>
                    <span class="stats-circle-label">learned</span>
                </div>
            </div>
        </section>

        <section id="learning" class="main-section hidden">
            <div id="learning-card" class="flash-card">
                <h2 id="card-eng">Word</h2>
                <p id="card-ukr" class="hidden">Translation</p>
                <div id="card-status"></div>
            </div>
            <div class="swipe-hints">
                <span>don't know</span>
                <span>know</span>
            </div>
        </section>

        <section id="add-word" class="main-section hidden">
            <h1 class="screen-title">Add word</h1>
            <p class="screen-subtitle">Type a word — we'll find the translation</p>

            <span class="input-label">English word</span>
            <input type="text" id="new-word-input" placeholder="e.g. butterfly" autocomplete="off">

            <div class="translation-card">
                <div class="translation-content">
                    <span class="translation-sublabel">Translation</span>
                    <span id="translation-preview">translation</span>
                </div>
            </div>

            <button id="translate-button">Add to dictionary</button>

            <div class="recent-title">Recently added</div>
            <div id="word-list"></div>
        </section>

        <section id="dictionary" class="main-section hidden">
            <h1 class="screen-title">My words</h1>
            <p class="screen-subtitle">All words and their progress</p>
            <div id="word-list-dictionary"></div>
        </section>

    </main>

    <nav id="main-nav">
        <button class="nav-button" data-target="main-page">
            <span>Home</span>
        </button>
        <button class="nav-button" data-target="learning">
            <span>Cards</span>
        </button>
        <button class="nav-button" data-target="add-word">
            <span>Add</span>
        </button>
        <button class="nav-button" data-target="dictionary">
            <span>Words</span>
        </button>
    </nav>

</body>
</html>
